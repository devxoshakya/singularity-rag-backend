services:
  ragbot:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONGO_URI=${MONGO_URI}
    volumes:
      - ./clg_pdfs:/app/clg_pdfs
      - ./result_pdfs:/app/result_pdfs
    restart: unless-stopped

  # Optional: Local MongoDB for development (commented out since you're using Atlas)
  # Uncomment the section below if you want to use local MongoDB instead
