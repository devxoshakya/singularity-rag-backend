name: Build and Push to Docker Hub

# This tells GitHub to run the robot every time you push to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest # The robot uses a fresh Linux machine in the cloud

    steps:
      # 1. Pull your code from GitHub onto the robot's machine
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Log into Docker Hub using the secrets we saved earlier
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build the image and push it to the cloud
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Replace 'yourusername' and 'rag-bot' with your actual names
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ragbot:latest